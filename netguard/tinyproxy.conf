Port 3128
Listen 127.0.0.1
Timeout 600
DefaultErrorFile "/usr/share/tinyproxy/default.html"
StatFile "/usr/share/tinyproxy/stats.html"

LogLevel Info

PidFile "/tmp/tinyproxy.pid"

MaxClients 64

Allow 127.0.0.1
ViaProxyName "hermes-egress"
DisableViaHeader Yes
ConnectPort 443
ConnectPort 80

# All accepted requests are forwarded to the local mihomo sidecar. netguard's
# UID firewall prevents tinyproxy from connecting anywhere else.
Upstream http 127.0.0.1:7890
